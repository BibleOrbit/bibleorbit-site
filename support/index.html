<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Support | Bible Orbit</title>
    <meta name="description" content="Contact Bible Orbit support." />
    <link rel="canonical" href="https://bibleorbit.org/support/" />
    <style>
      :root {
        color-scheme: dark light;
        --bg: #080d17;
        --panel: #111827;
        --text: #f8fafc;
        --muted: #bac7d8;
        --gold: #f0c433;
        --border: rgba(148, 163, 184, 0.24);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(720px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 4rem 0;
      }

      section {
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        background: rgba(17, 24, 39, 0.84);
        padding: clamp(1.25rem, 4vw, 2.25rem);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 7vw, 3rem);
        letter-spacing: 0;
      }

      p {
        color: var(--muted);
        line-height: 1.7;
      }

      a {
        color: var(--gold);
        font-weight: 750;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f5f7fb;
          --panel: #ffffff;
          --text: #101827;
          --muted: #43536a;
          --border: rgba(30, 41, 59, 0.16);
        }

        section {
          background: #ffffff;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Bible Orbit Support</h1>
        <p>
          For support, account deletion requests, or privacy questions, contact
          <a href="mailto:support@bibleorbit.org">support@bibleorbit.org</a>.
        </p>
        <p><a href="/privacy/">Privacy Policy</a></p>
      </section>
    </main>
  </body>
</html>
